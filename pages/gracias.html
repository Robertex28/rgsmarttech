<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mensaje enviado — R.G Smart Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .gracias-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 5%;position:relative;z-index:1}
    .gracias-ico{font-size:72px;margin-bottom:24px;animation:fu .6s ease forwards}
    .gracias-titulo{font-family:'Barlow Condensed',sans-serif;font-size:clamp(36px,6vw,64px);font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;line-height:1.05}
    .gracias-titulo span{color:var(--red-lt)}
    .gracias-sub{font-size:18px;color:var(--gray);line-height:1.75;max-width:480px;margin:0 auto 48px}
    .gracias-back{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--blue),var(--blue-lt));color:#fff;padding:16px 40px;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:1px;text-decoration:none;box-shadow:0 4px 20px rgba(21,96,212,0.3);transition:transform .2s,box-shadow .2s}
    .gracias-back:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(21,96,212,0.5)}
    .gracias-logo{margin-bottom:48px}
    .gracias-logo img{height:56px;width:auto}
  </style>
</head>
<body>
<div class="gracias-wrap">
  <div class="gracias-logo">
    <a href="../index.html"><img src="../assets/img/icono_solo.png" style="height:60px;width:60px;object-fit:contain" alt="R.G Smart Technology"/></a>
  </div>
  <div class="gracias-ico">✅</div>
  <h1 class="gracias-titulo fu d1">¡Mensaje <span>enviado!</span></h1>
  <p class="gracias-sub fu d2">Recibimos tu solicitud. Te contactaremos pronto — normalmente en menos de 2 horas por WhatsApp o email.</p>
  <a href="../index.html" class="gracias-back fu d3">← Volver al inicio</a>
</div>
</body>
</html>
